# ============================================================
# NetOps AI Platform — Phase 0
# Containers: PostgreSQL + Go API + NSX Collector + React Frontend
#
# Run:   docker compose -f docker-compose.phase0.yml up -d
# Stop:  docker compose -f docker-compose.phase0.yml down
#
# Secrets: injected via Docker Secrets (see scripts/deploy-phase0.sh)
# NO credentials in .env — tokens via Docker Secrets only
# ============================================================

version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - netops-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nsx-collector:
    build:
      context: ../../collectors/nsx
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NSX_MANAGER_URL: ${NSX_MANAGER_URL}
      NSX_VERIFY_SSL: ${NSX_VERIFY_SSL:-true}
      NSX_COLLECT_INTERVAL_SECONDS: ${NSX_COLLECT_INTERVAL_SECONDS:-300}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
    secrets:
      - nsx_api_token
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - netops-internal
      - netops-external

  backend-api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      API_PORT: ${API_PORT:-8080}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
    secrets:
      - api_secret_key
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - netops-internal

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend-api
    networks:
      - netops-internal

volumes:
  pgdata:

networks:
  netops-internal:
    driver: bridge
  netops-external:
    driver: bridge

secrets:
  nsx_api_token:
    external: true
  postgres_password:
    external: true
  api_secret_key:
    external: true
